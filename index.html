<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eli ♥ Cris</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="overlay"></div>

<div class="card">
    <p class="eyebrow">NUESTRA BODA</p>

    <h1>Eli <span>♥</span> Cris</h1>

    <p class="date">09 · Octubre · 2027</p>

    <div class="countdown">
        <div class="item">
            <span id="days">0</span>
            <small>DÍAS</small>
        </div>

        <div class="item">
            <span id="hours">00</span>
            <small>HORAS</small>
        </div>

        <div class="item">
            <span id="minutes">00</span>
            <small>MINUTOS</small>
        </div>

        <div class="item">
            <span id="seconds">00</span>
            <small>SEGUNDOS</small>
        </div>
    </div>

    <p class="quote">El primer día del resto de nuestras vidas.</p>
</div>

<script src="script.js"></script>
</body>
</html>
